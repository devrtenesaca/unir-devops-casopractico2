---
- name: Deploy Infrastructure
  hosts: webserver
  become: true
  gather_facts: true

  tasks:
    - name: Ping all hosts
      ansible.builtin.ping:

#-----------------------
  #Obtener outputs de terraform
  #-------------------------
    - name: obtener los oututs de terraform
      command: terraform output -json
      args: 
        chdir: "../infra"
      register: tf_outputs
      delegate_to: localhost
      become: false
#----------------------- 
#variable set
#-------------------------
    - name: Set facts
      set_fact:
        acr_server: "{{ (tf_outputs.stdout | from_json).acr_login_server.value }}"
        acr_user: "{{ (tf_outputs.stdout | from_json).acr_admin_username.value }}"
        acr_pass: "{{ (tf_outputs.stdout | from_json).acr_admin_password.value }}"
#-----------------------
#Login en ACR
#-------------------------
    - name: Login en ACR
      containers.podman.podman_login:
      #community.docker.docker_login:
        registry: "{{ acr_server }}"
        username: "{{ acr_user }}"
        password: "{{ acr_pass }}"

#-----------------------
#Descargar la imagen del ACR
#-------------------------
    - name: Descargar la imagen del ACR
      containers.podman.podman_image:
      #community.docker.docker_image:
        name: "{{ acr_server }}/fifa-app:latest"  
        pull: true
#-----------------------
#Ejecutar la imagen en el servidor web
#-------------------------
    - name: Ejecutar la imagen en el servidor web
      containers.podman.podman_container:
        name: fifa_app
        image: "{{ acr_server }}/fifa-app:latest"
        state: started
        restart_policy: always
        published_ports:
          - "443:443"
        generate_systemd: 
          path: /etc/systemd/system/
          names: true
          
          
#recargar systemd para que reconozca el nuevo servicio
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes

# Habilitar e iniciar el servicio del contenedor
    - name: Enable and start the container service
      ansible.builtin.systemd:
        name: container-fifa_app.service
        enabled: true
        state: started